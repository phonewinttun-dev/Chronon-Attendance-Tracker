<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACST.WebApp</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tailwind.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ACST.WebApp.styles.css" rel="stylesheet" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body class="bg-background text-foreground font-sans antialiased">
    <div id="app">
        <div class="flex flex-col h-screen items-center justify-center bg-background gap-4">
            <lottie-player src="system_loading_screen.json" background="transparent" speed="1" style="width: 240px; height: 240px;" loop autoplay></lottie-player>
            <div class="text-xs font-mono text-muted-foreground/60 animate-pulse tracking-widest uppercase">Initializing Attendance System</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        window.getButtonPosition = (buttonId) => {
            const el = document.getElementById(buttonId);
            if (!el) return null;
            const rect = el.getBoundingClientRect();
            return {
                Left: rect.left,
                Top: rect.top,
                Right: rect.right,
                Bottom: rect.bottom,
                Width: rect.width,
                Height: rect.height
            };
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
